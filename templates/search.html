<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search Archive - A Good Feed of NL News</title>
  <meta name="description" content="Search the NL news archive — every article from CBC, NTV, VOCM, SaltWire, The Independent, and Shoreline.">
  <meta property="og:title" content="Search Archive - A Good Feed of NL News">
  <meta property="og:description" content="Search the NL news archive.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="icons/icon-512.png">
  <link rel="stylesheet" href="style.css?v={{ css_hash }}">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#111111">
  <script>
    (function() {
      var r = document.documentElement;
      var theme = localStorage.getItem('theme');
      if (theme) r.setAttribute('data-theme', theme);
    })();
  </script>
</head>
<body>
  <a class="skip-link" href="#results">Skip to results</a>

  <header>
    <h1><a href="./" class="header-home"><span class="brand-sub">A</span><span class="brand-main">GOOD FEED</span> <span class="brand-sub">of NL news</span></a></h1>
    <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode"><svg class="theme-icon-sun" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg><svg class="theme-icon-moon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
  </header>

  <div class="search-controls">
    <div class="search-bar">
      <input type="search" id="search-input" placeholder="Search articles..." aria-label="Search articles" autocomplete="off">
    </div>
    <div class="search-filters">
      <input type="date" id="date-from" aria-label="From date">
      <span class="search-filter-sep">to</span>
      <input type="date" id="date-to" aria-label="To date">
    </div>
    <div class="search-meta">
      <span id="result-count"></span>
    </div>
  </div>

  <main id="results" role="feed" aria-label="Search results">
    <div id="loading" class="search-status">Loading archive...</div>
    <div id="ready" class="search-status" hidden>Search by keyword or select a date range.</div>
    <div id="empty" class="search-status" hidden>No articles match your search.</div>
  </main>

  <footer>
    <p><a href="./">Back to feed</a></p>
  </footer>

  <script>
    (function() {
      var root = document.documentElement;
      var searchInput = document.getElementById('search-input');
      var dateFrom = document.getElementById('date-from');
      var dateTo = document.getElementById('date-to');
      var resultsEl = document.getElementById('results');
      var loadingEl = document.getElementById('loading');
      var readyEl = document.getElementById('ready');
      var emptyEl = document.getElementById('empty');
      var countEl = document.getElementById('result-count');

      var allArticles = [];
      var currentQuery = '';
      var debounceTimer = null;
      var PAGE_SIZE = 100;
      var rendered = 0;
      var filtered = [];

      // --- Theme toggle ---
      document.getElementById('theme-toggle').addEventListener('click', function() {
        var t = root.getAttribute('data-theme');
        var dark = t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches);
        var next = dark ? 'light' : 'dark';
        root.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
      });

      // --- Load all years upfront ---
      fetch('data/years.json')
        .then(function(r) { return r.json(); })
        .then(function(yearIndex) {
          return Promise.all(yearIndex.map(function(y) {
            return fetch('data/' + y.year + '.json').then(function(r) { return r.json(); });
          }));
        })
        .then(function(yearArrays) {
          for (var i = 0; i < yearArrays.length; i++) {
            allArticles = allArticles.concat(yearArrays[i]);
          }
          allArticles.sort(function(a, b) {
            return b.published.localeCompare(a.published);
          });
          loadingEl.hidden = true;
          readyEl.hidden = false;
          readParams();
          if (searchInput.value.trim() || dateFrom.value || dateTo.value) {
            applySearch();
          } else {
            searchInput.focus();
          }
        })
        .catch(function() {
          loadingEl.textContent = 'Failed to load archive.';
        });

      // --- Search and filter ---
      function applySearch() {
        var query = searchInput.value.toLowerCase().trim();
        var from = dateFrom.value;
        var to = dateTo.value;
        currentQuery = query;

        if (!query && !from && !to) {
          filtered = [];
          rendered = 0;
          clearResults();
          countEl.textContent = '';
          emptyEl.hidden = true;
          readyEl.hidden = false;
          writeParams();
          return;
        }

        readyEl.hidden = true;

        var words = query ? query.split(/\s+/) : [];
        // Pad "to" date to end of day for inclusive comparison
        var toEnd = to ? to + 'T23:59:59' : '';

        filtered = allArticles.filter(function(a) {
          // Date filter
          if (from && a.published.substring(0, 10) < from) return false;
          if (toEnd && a.published.substring(0, 19) > toEnd) return false;

          // Text filter
          if (words.length > 0) {
            var text = (a.title + ' ' + (a.summary || '')).toLowerCase();
            for (var i = 0; i < words.length; i++) {
              if (text.indexOf(words[i]) === -1) return false;
            }
          }
          return true;
        });

        rendered = 0;
        clearResults();
        renderBatch();

        var total = filtered.length;
        countEl.textContent = total === 1 ? '1 article' : total + ' articles';
        emptyEl.hidden = total > 0;
        writeParams();
      }

      var lastDateLabel = null;

      function clearResults() {
        var els = resultsEl.querySelectorAll('.article-row, .date-header');
        for (var i = 0; i < els.length; i++) {
          resultsEl.removeChild(els[i]);
        }
        lastDateLabel = null;
      }

      function renderBatch() {
        var end = Math.min(rendered + PAGE_SIZE, filtered.length);
        var frag = document.createDocumentFragment();
        var months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
        var days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

        for (var i = rendered; i < end; i++) {
          var d = new Date(filtered[i].published);
          var label = days[d.getDay()] + ', ' + months[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
          if (label !== lastDateLabel) {
            var h = document.createElement('h2');
            h.className = 'date-header';
            h.textContent = label;
            frag.appendChild(h);
            lastDateLabel = label;
          }
          frag.appendChild(createRow(filtered[i]));
        }
        resultsEl.insertBefore(frag, emptyEl);
        rendered = end;
      }

      function buildSnippet(summary, query) {
        if (!summary || !query) return '';
        var lower = summary.toLowerCase();
        var words = query.split(/\s+/);
        var firstIdx = summary.length;
        for (var i = 0; i < words.length; i++) {
          var idx = lower.indexOf(words[i]);
          if (idx !== -1 && idx < firstIdx) firstIdx = idx;
        }
        if (firstIdx >= summary.length) return '';

        var start = Math.max(0, firstIdx - 40);
        var end = Math.min(summary.length, firstIdx + 80);
        var snippet = summary.substring(start, end);
        if (start > 0) snippet = '...' + snippet;
        if (end < summary.length) snippet = snippet + '...';

        snippet = snippet.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        for (var i = 0; i < words.length; i++) {
          if (!words[i]) continue;
          var escaped = words[i].replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
          var re = new RegExp('(' + escaped + ')', 'gi');
          snippet = snippet.replace(re, '<mark>$1</mark>');
        }
        return snippet;
      }

      function createRow(a) {
        var row = document.createElement('article');
        row.className = 'article-row';
        row.setAttribute('data-source', a.source_slug);

        var d = new Date(a.published);
        var hrs = d.getHours() % 12 || 12;
        var mins = d.getMinutes().toString().padStart(2, '0');
        var ampm = d.getHours() >= 12 ? 'pm' : 'am';

        var time = document.createElement('time');
        time.className = 'article-time';
        time.setAttribute('datetime', a.published);
        time.textContent = hrs + ':' + mins + ampm;

        var logo = document.createElement('img');
        logo.className = 'source-logo';
        logo.src = 'logos/' + a.source_slug + '.png';
        logo.alt = a.source_name;
        logo.title = a.source_name;

        var content = document.createElement('div');
        content.className = 'article-content';

        var link = document.createElement('a');
        link.className = 'article-link';
        link.href = a.link;
        link.textContent = a.title;
        content.appendChild(link);

        var snippet = buildSnippet(a.summary || '', currentQuery);
        if (snippet) {
          var snippetEl = document.createElement('div');
          snippetEl.className = 'article-snippet';
          snippetEl.innerHTML = snippet;
          content.appendChild(snippetEl);
        }

        row.appendChild(time);
        row.appendChild(logo);
        row.appendChild(content);
        return row;
      }

      // --- Infinite scroll ---
      window.addEventListener('scroll', function() {
        if (rendered >= filtered.length) return;
        if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 400) {
          renderBatch();
        }
      });

      // --- Event listeners ---
      searchInput.addEventListener('input', function() {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(applySearch, 200);
      });
      dateFrom.addEventListener('change', applySearch);
      dateTo.addEventListener('change', applySearch);

      // --- URL params ---
      function readParams() {
        var p = new URLSearchParams(window.location.search);
        if (p.get('q')) searchInput.value = p.get('q');
        if (p.get('from')) dateFrom.value = p.get('from');
        if (p.get('to')) dateTo.value = p.get('to');
      }

      function writeParams() {
        var p = new URLSearchParams();
        if (searchInput.value.trim()) p.set('q', searchInput.value.trim());
        if (dateFrom.value) p.set('from', dateFrom.value);
        if (dateTo.value) p.set('to', dateTo.value);
        var qs = p.toString();
        var url = window.location.pathname + (qs ? '?' + qs : '');
        history.replaceState(null, '', url);
      }
    })();
  </script>
</body>
</html>
