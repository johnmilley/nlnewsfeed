  <path d="M392 32 v88 h88" fill="none" stroke="#111111" stroke-width="16" stroke-linejoin="round"/>
  <!-- Horizontal rules (newspaper lines) -->
  <line x1="128" y1="400" x2="384" y2="400" stroke="#cccccc" stroke-width="6"/>
  <line x1="128" y1="430" x2="340" y2="430" stroke="#cccccc" stroke-width="6"/>
  <line x1="128" y1="460" x2="360" y2="460" stroke="#cccccc" stroke-width="6"/>
