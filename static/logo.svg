    <!-- Island of Newfoundland -->
    <path d="M55 100 L72 95 L85 100 L100 95 L115 105 L120 120 L130 115 L140 125 L135 140 L125 148 L115 142 L105 150 L95 145 L80 155 L65 150 L55 140 L50 125 L58 115 L52 108 Z"/>
  </g>
</svg>
